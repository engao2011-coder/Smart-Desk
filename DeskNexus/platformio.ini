; PlatformIO Project Configuration — DeskNexus
;
; Hardware: ESP32-2432S028R ("Cheap Yellow Display" / CYD)
;           2.8" ILI9341 TFT (240×320) + XPT2046 resistive touch
;
; Flash with:   pio run --target upload
; Monitor:      pio device monitor --baud 115200

[env:cyd]
platform  = espressif32
board     = esp32dev
framework = arduino

; ── Upload / monitor ────────────────────────────────────────────────────────
monitor_speed = 115200

; ── Library dependencies ────────────────────────────────────────────────────
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    bblanchon/ArduinoJson @ ^6.21.5

; ── TFT_eSPI pin & driver configuration (CYD board) ────────────────────────
; Setting USER_SETUP_LOADED tells the library to skip its own User_Setup.h
; and use only what is defined here via build_flags.
build_flags =
    -DUSER_SETUP_LOADED
    -DILI9341_DRIVER
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTOUCH_CS=33
    -DSPI_FREQUENCY=40000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_GFXFF
    -DSMOOTH_FONT
